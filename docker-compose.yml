services:
  postgres:
    image: postgres:16-alpine
    container_name: bright_path_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bright_path
      POSTGRES_PASSWORD: bright_path_dev_password
      POSTGRES_DB: bright_path
    ports:
      - "5432:5432"
    volumes:
      - bright_path_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bright_path -d bright_path"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  bright_path_pgdata: